<div class="container mt-4" style="max-width: 1000px;">

  <div class="mb-3">
    <button class="btn btn-sm btn-link text-warning p-0 text-decoration-none" type="button">
      <i class="bi bi-arrow-left me-1"></i> Panel General
    </button>
  </div>

  <div class="card bg-secondary bg-opacity-10 border-secondary mb-4">
    <div class="card-body row align-items-center g-3">
      <div class="col-md-7">
        <span class="badge bg-warning text-dark fw-bold mb-2 tracking-wider text-uppercase">
          Fase: {{ batchManagementModel().status }}
        </span>
        <h1 class="h3 text-white fw-bold mb-1">{{ batchManagementModel().name }}</h1>
        <p class="text-white small font-monospace mb-0">
          ID Lote: {{ batchManagementModel().batchId }}
        </p>
      </div>

      <div class="col-md-5 d-flex gap-3 justify-content-md-end">
        <div class="p-2 px-3 rounded bg-dark border border-secondary text-center">
          <span class="text-uppercase d-block small text-white" style="font-size: 0.7; font-size: 0.7rem;">Gravedad
            Inicial
            (OG)
          </span>
          <span class="fs-5 font-monospace text-info fw-bold">1.092</span>
        </div>
        <div class="p-2 px-3 rounded bg-dark border border-secondary text-center">
          <span class="text-uppercase  d-block small text-white" style="font-size: 0.7rem;">
            Última Gravedad (SG)
          </span>
          <span class="fs-5 font-monospace text-success fw-bold">1.045</span>
        </div>
        <div class="p-2 px-3 rounded bg-dark border border-warning text-center">
          <span class="text-uppercase d-block small  text-white" style="font-size: 0.7rem;">
            Alcohol Real
          </span>
          <span class="fs-5 font-monospace text-warning fw-bold">6.17% ABV</span>
        </div>
      </div>
    </div>
  </div>

  <ul class="nav nav-tabs border-secondary mb-4">
    <li class="nav-item">
      <button (click)="changePahse(1)"
              [class]="phaseStep()===1
        ?'nav-link bg-transparent border-0 text-uppercase small fw-bold py-2 px-3 text-warning border-bottom border-warning border-3'
        :'nav-link bg-transparent border-0 text-uppercase small fw-bold py-2 px-3 text-white-50'"
              type="button">
        1. Bitácora de Fermentación
      </button>
    </li>
    <li class="nav-item">
      <button (click)="changePahse(2)"
              [class]="phaseStep()===2
        ?'nav-link bg-transparent border-0 text-uppercase small fw-bold py-2 px-3 text-warning border-bottom border-warning border-3'
        :'nav-link bg-transparent border-0 text-uppercase small fw-bold py-2 px-3 text-white-50'"
              type="button">
        2. Maduración y Clarificación
      </button>
    </li>
    <li class="nav-item">
      <button (click)="changePahse(3)"
              [class]="phaseStep()===3
        ?'nav-link bg-transparent border-0 text-uppercase small fw-bold py-2 px-3 text-warning border-bottom border-warning border-3'
        :'nav-link bg-transparent border-0 text-uppercase small fw-bold py-2 px-3 text-white-50'"
              type="button">
        3. Envasado y Marbetes (SAT)
      </button>
    </li>
  </ul>

  <div class="tab-content text-white pb-5">

    @if (phaseStep() === 1) {
      <app-fermentation-phase [batchId]="id()">
      </app-fermentation-phase>
    } @else if (phaseStep() === 2) {
      <app-conditioning-phase [batchId]="id()"></app-conditioning-phase>
    } @else if (phaseStep() === 3) {
      <app-packaging-phase></app-packaging-phase>
    }

  </div>
</div>
